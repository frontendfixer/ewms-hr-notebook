# Optional local Postgres for schema development without a Neon project.
# Production and staging should use Neon connection strings from .env.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ewms
      POSTGRES_USER: ewms
      POSTGRES_PASSWORD: ewms
    ports:
      - "5432:5432"
    volumes:
      - ewms_postgres:/var/lib/postgresql/data

volumes:
  ewms_postgres:
